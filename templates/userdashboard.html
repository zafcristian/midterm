
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: flex;
        min-height: 100vh;
        background: #f4f6f9;
      }

      .sidebar {
        width: 230px;
        background: #2f3542;
        color: white;
        padding: 20px;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 8px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #57606f;
      }

      .main {
        flex: 1;
        padding: 30px;
      }

      .header {
        margin-bottom: 25px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .card h3 {
        margin-bottom: 10px;
      }

      .card a {
        text-decoration: none;
        color: #3742fa;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>User</h2>      
     
      <a href="{{ url_for('userdashboard') }}" class="active">Dashboard</a>
      <a href="{{ url_for('userdashboard_section', section='pricing') }}"
        >Pricing Management</a
      >
      <a href="{{ url_for('userdashboard_section', section='discount') }}"
        >Discount Management</a
      > 
             
      <a href="{{ url_for('userdashboard_section', section='settings') }}"
        >Settings</a
      >
      
      <a href="{{ url_for('logout') }}">Logout</a>

    </div>

    <div class="main">
      <div class="header">
        <h1>User Dashboard</h1>
        <p>Welcome, User</p>
      </div>

      <div class="cards">
        <div class="card">       
          <h1> <p style= "color : purple;"> Product Pricing and Discount Management System</h1>

          <h4> <p style= "color : purple;"> Manage product pricing ,discount, and promotional period.
                   
          </div>
      </div>
    </div>
  </body>
</html>
