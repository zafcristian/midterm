<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discount Management</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: flex;
        min-height: 100vh;
        background: #f4f6f9;
      }

      .sidebar {
        width: 230px;
        background: #2f3542;
        color: white;
        padding: 20px;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 8px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #57606f;
      }

      .main {
        flex: 1;
        padding: 30px;
      }

      .header {
        margin-bottom: 25px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      .message-list {
        margin-bottom: 20px;
        padding: 12px 14px;
        border-radius: 8px;
        display: none;
      }

      .message-list.success {
        background: #dcfce7;
        color: #166534;
        display: block;
      }

      .message-list.error {
        background: #fee2e2;
        color: #991b1b;
        display: block;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-top: 15px;
      }

      .field label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
        color: #555;
      }

      .field input,
      .field select,
      .field button {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
      }

      .field select {
        background: white;
        color: #111827;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-image: linear-gradient(45deg, transparent 50%, #64748b 50%),
          linear-gradient(135deg, #64748b 50%, transparent 50%);
        background-position: calc(100% - 18px) calc(50% - 3px),
          calc(100% - 12px) calc(50% - 3px);
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
        padding-right: 36px;
      }

      .field button {
        border: none;
        background: #2f3542;
        color: white;
        cursor: pointer;
      }

      table {
        width: 100%;
        margin-top: 15px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead,
      tbody tr {
        display: table;
        width: 100%;
        table-layout: fixed;
      }

      tbody {
        display: block;
        max-height: 400px;
        overflow-y: auto;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
        vertical-align: top;
      }

      .empty-state {
        color: #555;
      }

      .remove-btn {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        background: #e74c3c;
        color: white;
        cursor: pointer;
      }

      .status-active {
        color: green;
        font-weight: bold;
      }

      .status-inactive {
        color: red;
        font-weight: bold;
      }

      .countdown-timer {
        font-size: 12px;
        font-family: monospace;
        background: #f0f0f0;
        padding: 4px 8px;
        border-radius: 4px;
        display: inline-block;
        margin-top: 5px;
      }

      .countdown-label {
        font-size: 10px;
        color: #666;
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Admin</h2>

      <a href="{{ url_for('admindashboard') }}">Dashboard</a>
      <a href="{{ url_for('adminproductmanagement') }}">Product Management</a>
      <a href="{{ url_for('admindiscountmanagement') }}" class="active">Discount Management</a>
      <a href="#">Settings</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <div class="main">
      <div class="message-list" id="statusMessage"></div>

      <div class="header">
        <h1>Discount Management</h1>
        <p>Welcome Admin!</p>
      </div>

      <div class="card">
        <h3>Create or Update Discount</h3>
        <p>Discount is percent-only and applies immediately to an existing product.</p>

        <form id="discountForm">
          <div class="form-row">
            <div class="field">
              <label for="product_id">Product ID</label>
              <input type="text" name="product_id" id="product_id" required />
            </div>

            <div class="field">
              <label for="discount_percent">Discount Percent</label>
              <select
                name="discount_percent"
                id="discount_percent"
                required
              >
                <option value="" disabled selected hidden>Select Discount Percent</option>
                <option value="10">10% - Rule 1 (10% off)</option>
                <option value="20">20% - Rule 2 (20% off)</option>
                <option value="30">30% - Rule 3 (30% off)</option>
                <option value="40">40% - Rule 4 (40% off)</option>
                <option value="50">50% - Rule 5 (50% off)</option>
              </select>
            </div>
            <div class="field">
              <label for="start_date">Start Date and Time</label>
              <input type="datetime-local" name="start_date" id="start_date" required />
            </div>
            <div class="field">
              <label for="end_date">End Date and Time</label>
              <input type="datetime-local" name="end_date" id="end_date" required />
            </div>

            <div class="field">
              <label>&nbsp;</label>
              <button type="submit">Save Discount</button>
            </div>
          </div>
        </form>
      </div>

      <div class="card">
        <h3>Saved Discounts</h3>
        <table>
          <thead>
            <tr>
              <th>Product ID</th>
              <th>Base Price</th>
              <th>Discount</th>
              <th>Discounted Price</th>
              <th>Status</th>
              <th>Countdown</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="discountTableBody"></tbody>
        </table>
      </div>
    </div>

    <script>
      const productStorageKey = "pricing_products";
      const discountStorageKey = "pricing_discounts";
      const discountForm = document.getElementById("discountForm");
      const productIdInput = document.getElementById("product_id");
      const discountPercentInput = document.getElementById("discount_percent");
      const discountTableBody = document.getElementById("discountTableBody");
      const statusMessage = document.getElementById("statusMessage");
      const productListId = "savedDiscountProductIds";
      
      let countdownIntervals = [];

      function getProducts() {
        const savedProducts = localStorage.getItem(productStorageKey);
        return savedProducts ? JSON.parse(savedProducts) : [];
      }

      function getDiscounts() {
        const savedDiscounts = localStorage.getItem(discountStorageKey);
        return savedDiscounts ? JSON.parse(savedDiscounts) : [];
      }

      function saveDiscounts(discounts) {
        localStorage.setItem(discountStorageKey, JSON.stringify(discounts));
      }

      function formatPrice(price) {
        return Number(price).toFixed(2);
      }

      function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "message-list " + type;
      }

      function renderProductOptions() {
        const products = getProducts().slice().sort((a, b) => Number(a.id) - Number(b.id));
        let datalist = document.getElementById(productListId);

        if (!datalist) {
          datalist = document.createElement("datalist");
          datalist.id = productListId;
          document.body.appendChild(datalist);
        }

        datalist.innerHTML = products.map((product) => `<option value="${product.id}"></option>`).join("");
        productIdInput.setAttribute("list", productListId);
      }

      function checkDiscountStatus(startDate, endDate) {
        const now = new Date();
        const start = new Date(startDate);
        const end = new Date(endDate);
        
        if (now >= start && now <= end) {
          return "active";
        } else if (now < start) {
          return "not_started";
        } else {
          return "expired";
        }
      }

      function getCountdown(startDate, endDate, status) {
        const now = new Date();
        const start = new Date(startDate);
        const end = new Date(endDate);
        
        if (status === "not_started") {
          const timeDiff = start - now;
          if (timeDiff > 0) {
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            return {
              type: "starts_in",
              days, hours, minutes, seconds,
              text: `Starts in: ${days}d ${hours}h ${minutes}m ${seconds}s`
            };
          }
        } else if (status === "active") {
          const timeDiff = end - now;
          if (timeDiff > 0) {
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            return {
              type: "ends_in",
              days, hours, minutes, seconds,
              text: `Ends in: ${days}d ${hours}h ${minutes}m ${seconds}s`
            };
          }
        }
        return null;
      }

      function getDiscountRows() {
        const products = getProducts();
        const discounts = getDiscounts();
        const productMap = {};

        products.forEach((product) => {
          productMap[String(product.id)] = product;
        });

        return discounts
          .map((discount) => {
            const product = productMap[String(discount.product_id)];
            if (!product) {
              return null;
            }

            const status = checkDiscountStatus(discount.start_date, discount.end_date);
            const basePrice = Number(product.base_price);
            const percent = Number(discount.discount_percent);
            const isActive = (status === "active");
            const discountedPrice = isActive ? (basePrice - (basePrice * percent) / 100) : basePrice;

            return {
              product_id: discount.product_id,
              discount_percent: percent,
              base_price: basePrice,
              discounted_price: discountedPrice < 0 ? 0 : discountedPrice,
              created_at: discount.created_at,
              start_date: discount.start_date,
              end_date: discount.end_date,
              status: status
            };
          })
          .filter(Boolean);
      }

      function getStatusText(status) {
        switch(status) {
          case "active":
            return '<span class="status-active">● Active</span>';
          case "not_started":
            return '<span class="status-inactive">● Not Started Yet</span>';
          case "expired":
            return '<span class="status-inactive">● Expired</span>';
          default:
            return '<span class="status-inactive">● Unknown</span>';
        }
      }

      function updateCountdowns() {
        const rows = getDiscountRows();
        rows.forEach((item, index) => {
          const countdownElement = document.getElementById(`countdown-${item.product_id}`);
          if (countdownElement) {
            const countdown = getCountdown(item.start_date, item.end_date, item.status);
            if (countdown) {
              const newCountdown = getCountdown(item.start_date, item.end_date, item.status);
              if (newCountdown) {
                countdownElement.innerHTML = `
                  <span class="countdown-label">${countdown.type === 'starts_in' ? '📅 STARTS IN:' : '⏰ ENDS IN:'}</span>
                  <span class="countdown-timer">${newCountdown.days}d ${newCountdown.hours}h ${newCountdown.minutes}m ${newCountdown.seconds}s</span>
                `;
              }
            } else {
              if (item.status === "expired") {
                countdownElement.innerHTML = '<span class="countdown-label">⏱️</span><span class="countdown-timer">Expired</span>';
              } else if (item.status === "active" && new Date(item.end_date) < new Date()) {
                countdownElement.innerHTML = '<span class="countdown-label">⏱️</span><span class="countdown-timer">Ended</span>';
              }
            }
          }
        });
      }

      function renderDiscounts() {
        // Clear existing intervals
        countdownIntervals.forEach(interval => clearInterval(interval));
        countdownIntervals = [];
        
        const rows = getDiscountRows();
        discountTableBody.innerHTML = "";

        if (rows.length === 0) {
          discountTableBody.innerHTML = `
            <tr>
              <td colspan="7" class="empty-state">No discounts saved yet.</td>
            </tr>
          `;
          return;
        }

        rows.forEach((item) => {
          const row = document.createElement("tr");
          const statusHtml = getStatusText(item.status);
          const countdown = getCountdown(item.start_date, item.end_date, item.status);
          
          let countdownHtml = '';
          if (countdown) {
            countdownHtml = `
              <div id="countdown-${item.product_id}">
                <span class="countdown-label">${countdown.type === 'starts_in' ? '📅 STARTS IN:' : '⏰ ENDS IN:'}</span>
                <span class="countdown-timer">${countdown.days}d ${countdown.hours}h ${countdown.minutes}m ${countdown.seconds}s</span>
              </div>
            `;
          } else {
            if (item.status === "expired") {
              countdownHtml = '<div><span class="countdown-label">⏱️</span><span class="countdown-timer">Expired</span></div>';
            } else {
              countdownHtml = '<div><span class="countdown-label">⏱️</span><span class="countdown-timer">---</span></div>';
            }
          }
          
          row.innerHTML = `
            <td>${item.product_id}</td>
            <td>₱ ${formatPrice(item.base_price)}</td>
            <td>${item.discount_percent.toFixed(2)}%</td>
            <td>₱ ${formatPrice(item.discounted_price)}</td>
            <td>${statusHtml}</td>
            <td>${countdownHtml}</td>
            <td><button class="remove-btn" data-product-id="${item.product_id}">Remove</button></td>
          `;
          discountTableBody.appendChild(row);
        });
        
        // Start countdown update interval
        const interval = setInterval(() => {
          updateCountdowns();
          // Re-render if status changed
          const needsRerender = checkIfStatusChanged();
          if (needsRerender) {
            renderDiscounts();
          }
        }, 1000);
        countdownIntervals.push(interval);
      }
      
      function checkIfStatusChanged() {
        const rows = getDiscountRows();
        let changed = false;
        rows.forEach(item => {
          const newStatus = checkDiscountStatus(item.start_date, item.end_date);
          if (newStatus !== item.status) {
            changed = true;
          }
        });
        return changed;
      }

      function removeDiscount(productId) {
        const discounts = getDiscounts().filter((item) => String(item.product_id) !== String(productId));
        saveDiscounts(discounts);
        renderDiscounts();
        showMessage("Discount removed.", "success");
      }

      discountForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const productId = productIdInput.value.trim();
        const discountPercent = Number(discountPercentInput.value);
        const startDate = document.getElementById("start_date").value;
        const endDate = document.getElementById("end_date").value;
        const products = getProducts();
        const product = products.find((item) => String(item.id) === productId);

        if (!productId) {
          showMessage("Product ID is required.", "error");
          return;
        }

        if (!product) {
          showMessage("Product ID does not exist.", "error");
          return;
        }

        if (discountPercent <= 0 || discountPercent > 100) {
          showMessage("Discount percent must be greater than 0 and at most 100.", "error");
          return;
        }

        if (!startDate || !endDate) {
          showMessage("Start date and end date are required.", "error");
          return;
        }

        const start = new Date(startDate);
        const end = new Date(endDate);
        const now = new Date();

        if (start >= end) {
          showMessage("End date must be after start date.", "error");
          return;
        }

        const discountedPrice =
          Number(product.base_price) -
          (Number(product.base_price) * Number(discountPercent)) / 100;

        if (discountedPrice < 0) {
          showMessage("Discounted price must not be negative.", "error");
          return;
        }

        const discounts = getDiscounts();
        const existingIndex = discounts.findIndex((item) => String(item.product_id) === productId);
        const discountData = {
          product_id: productId,
          discount_percent: discountPercent,
          discounted_price: discountedPrice,
          start_date: startDate,
          end_date: endDate,
          created_at: new Date().toLocaleString(),
        };

        if (existingIndex >= 0) {
          discounts[existingIndex] = discountData;
          showMessage("Discount updated successfully.", "success");
        } else {
          discounts.push(discountData);
          showMessage("Discount created successfully.", "success");
        }

        saveDiscounts(discounts);
        renderDiscounts();
        discountForm.reset();
      });

      discountTableBody.addEventListener("click", function (event) {
        if (event.target.classList.contains("remove-btn")) {
          removeDiscount(event.target.getAttribute("data-product-id"));
        }
      });

      renderProductOptions();
      renderDiscounts();
    </script>
  </body>
</html>
