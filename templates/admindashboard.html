
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: flex;
        min-height: 100vh;
        background: #f4f6f9;
      }

      .sidebar {
        width: 230px;
        background: #2f3542;
        color: white;
        padding: 20px;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 8px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: #57606f;
      }

      .main {
        flex: 1;
        padding: 30px;
      }

      .header {
        margin-bottom: 25px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Admin</h2>

      <a href="{{ url_for('admindashboard') }}" class="active">Dashboard</a>
      <a href="{{ url_for('adminproductmanagement') }}">Product Management</a>
      <a href="{{ url_for('admindiscountmanagement') }}">Discount Management</a>  
      <a href="#">Settings</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <div class="main">
      <div class="header">
        <h1>Admin Dashboard</h1>
        <p>Welcome, Admin:)</p>
      </div>

      <div class="cards">
        <div class="card">       
          <h1> <p style= "color : purple;"> Product Pricing and Discount Management System</h1>

          <h4> <p style= "color : purple;"> Manage product pricing ,discount, and promotional period.
                   
    </div>
  </body>
</html>
