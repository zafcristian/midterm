
<!DOCTYPE html>
<html>
<head>
    <title>Product Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .delete {
            background: #e74c3c;
            padding: 5px 10px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            margin-top: 10px;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Product Dashboard</h1>

    <div class="card">
        <form action="/add" method="POST">
            <input type="number" name="name" placeholder="Product Id" required>
            <input type="number" name="price" placeholder="Price" required>
            <button type="submit">Add</button>
        </form>
    </div>

    <div class="card">
        <h3>Products</h3>
        <table border="1">
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Price</th>
                <th>Action</th>
            </tr>

            {% for product in products %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ product.name }}</td>
                <td>${{ product.price }}</td>
                <td>
                    <a href="/delete/{{ loop.index0 }}" class="delete">Delete</a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>
</div>

</body>
</html>
