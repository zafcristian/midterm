<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard | Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-chip span:first-child {
            font-size: 24px;
        }

        .stat-chip .stat-number {
            font-size: 20px;
            font-weight: bold;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-header i {
            font-size: 28px;
            color: #667eea;
        }

        .card-header h3 {
            font-size: 20px;
            color: #333;
        }

        .card-header .badge {
            margin-left: auto;
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Form Styles */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 28px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #f8f9fa;
            color: #555;
            font-weight: 600;
            font-size: 13px;
        }

        td {
            font-size: 14px;
            color: #333;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .product-id {
            font-weight: 600;
            color: #667eea;
        }

        .product-price {
            font-weight: 600;
            color: #27ae60;
            font-size: 16px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-edit:hover {
            background: #2980b9;
            transform: scale(1.05);
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 400px;
            max-width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .modal-save {
            background: #27ae60;
            color: white;
        }

        .modal-cancel {
            background: #95a5a6;
            color: white;
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .btn-primary {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 Product Dashboard</h1>
        <p>Manage your products - Add, Edit, and Delete products easily</p>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-chip">
            <span>📦</span>
            <span>Total Products: <span class="stat-number" id="totalProducts">0</span></span>
        </div>
        <div class="stat-chip">
            <span>💰</span>
            <span>Total Value: <span class="stat-number" id="totalValue">₱0</span></span>
        </div>
        <div class="stat-chip">
            <span>⭐</span>
            <span>Average Price: <span class="stat-number" id="avgPrice">₱0</span></span>
        </div>
    </div>

    <!-- Add Product Card -->
    <div class="card">
        <div class="card-header">
            ✨
            <h3>Add New Product</h3>
            <div class="badge">Form</div>
        </div>
        
        <form id="productForm">
            <div class="form-row">
                <div class="form-group">
                    <label>🆔 Product ID</label>
                    <input type="text" id="productId" placeholder="Enter product ID" required>
                </div>
                <div class="form-group">
                    <label>💰 Price (₱)</label>
                    <input type="number" id="productPrice" placeholder="Enter price" step="0.01" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-primary">➕ Add Product</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Products List Card -->
    <div class="card">
        <div class="card-header">
            📋
            <h3>Products List</h3>
            <div class="badge" id="productCount">0 items</div>
        </div>
        
        <div class="table-container">
            <table id="productTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Product ID</th>
                        <th>Price</th>
                        <th>Added Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <tr>
                        <td colspan="5" class="empty-state">📭 No products yet. Add your first product!</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Edit Product</h3>
        <label>Product ID</label>
        <input type="text" id="editProductId" placeholder="Product ID">
        <label>Price (₱)</label>
        <input type="number" id="editProductPrice" placeholder="Price" step="0.01">
        <div class="modal-buttons">
            <button class="modal-save" onclick="saveEdit()">Save Changes</button>
            <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast-notification" id="toastNotification">
    <span id="toastMessage"></span>
</div>

<script>
    const STORAGE_KEY = "product_dashboard_products";
    let currentEditIndex = null;

    function showToast(message, type) {
        const toast = document.getElementById('toastNotification');
        const toastMsg = document.getElementById('toastMessage');
        toastMsg.textContent = message;
        toast.style.background = type === 'success' ? '#27ae60' : '#e74c3c';
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    function getProducts() {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
    }

    function saveProducts(products) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
        renderProducts();
        updateStats();
    }

    function formatPrice(price) {
        return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(price);
    }

    function updateStats() {
        const products = getProducts();
        const total = products.length;
        const totalValue = products.reduce((sum, p) => sum + p.price, 0);
        const avgPrice = total > 0 ? totalValue / total : 0;
        
        document.getElementById('totalProducts').innerText = total;
        document.getElementById('totalValue').innerHTML = formatPrice(totalValue);
        document.getElementById('avgPrice').innerHTML = formatPrice(avgPrice);
        document.getElementById('productCount').innerText = total + ' item' + (total !== 1 ? 's' : '');
    }

    function renderProducts() {
        const products = getProducts();
        const tbody = document.getElementById('productTableBody');
        
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">📭 No products yet. Add your first product!</td></tr>';
            return;
        }
        
        tbody.innerHTML = products.map((product, index) => {
            const date = product.dateAdded || new Date().toLocaleDateString();
            return `
                <tr>
                    <td>${index + 1}</td>
                    <td class="product-id">${escapeHtml(product.id)}</td>
                    <td class="product-price">${formatPrice(product.price)}</td>
                    <td>${date}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="openEditModal(${index})">✏️ Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${index})">🗑️ Delete</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function addProduct(id, price) {
        if (!id || !price || price <= 0) {
            showToast('Please enter valid product ID and price!', 'error');
            return false;
        }
        
        const products = getProducts();
        
        // Check if product ID already exists
        if (products.some(p => p.id === id)) {
            showToast('Product ID already exists!', 'error');
            return false;
        }
        
        products.push({
            id: id,
            price: parseFloat(price),
            dateAdded: new Date().toLocaleDateString('en-PH')
        });
        
        saveProducts(products);
        showToast(`Product "${id}" added successfully!`, 'success');
        return true;
    }

    function updateProduct(index, newId, newPrice) {
        const products = getProducts();
        
        if (index < 0 || index >= products.length) return false;
        
        // Check if new ID conflicts with another product
        if (products.some((p, i) => i !== index && p.id === newId)) {
            showToast('Product ID already exists!', 'error');
            return false;
        }
        
        products[index] = {
            ...products[index],
            id: newId,
            price: parseFloat(newPrice)
        };
        
        saveProducts(products);
        showToast(`Product updated successfully!`, 'success');
        return true;
    }

    function deleteProduct(index) {
        if (confirm('Are you sure you want to delete this product?')) {
            const products = getProducts();
            const deleted = products[index];
            products.splice(index, 1);
            saveProducts(products);
            showToast(`Product "${deleted.id}" deleted!`, 'success');
        }
    }

    function openEditModal(index) {
        const products = getProducts();
        const product = products[index];
        if (product) {
            currentEditIndex = index;
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editProductPrice').value = product.price;
            document.getElementById('editModal').style.display = 'flex';
        }
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        currentEditIndex = null;
    }

    function saveEdit() {
        const newId = document.getElementById('editProductId').value.trim();
        const newPrice = parseFloat(document.getElementById('editProductPrice').value);
        
        if (!newId) {
            showToast('Product ID cannot be empty!', 'error');
            return;
        }
        
        if (isNaN(newPrice) || newPrice <= 0) {
            showToast('Please enter a valid price!', 'error');
            return;
        }
        
        if (currentEditIndex !== null) {
            updateProduct(currentEditIndex, newId, newPrice);
            closeEditModal();
        }
    }

    // Form submit handler
    document.getElementById('productForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const productId = document.getElementById('productId').value.trim();
        const productPrice = document.getElementById('productPrice').value;
        
        if (addProduct(productId, productPrice)) {
            document.getElementById('productForm').reset();
            document.getElementById('productId').focus();
        }
    });

    // Close modal when clicking outside
    window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target === modal) {
            closeEditModal();
        }
    }

    // Keyboard shortcut: ESC to close modal
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeEditModal();
        }
    });

    // Initialize
    renderProducts();
    updateStats();
</script>

</body>
</html>
